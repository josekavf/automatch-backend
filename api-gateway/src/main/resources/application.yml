server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# Observability Config
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# Swagger Aggregation Config
springdoc:
  swagger-ui:
    urls:
      - name: Serviço IAM
        url: /iam-service/v3/api-docs
      - name: Serviço de Catálogo
        url: /catalog-service/v3/api-docs
      - name: Serviço de Agendamento
        url: /booking-service/v3/api-docs
      - name: Serviço de Notificação
        url: /notification-service/v3/api-docs
