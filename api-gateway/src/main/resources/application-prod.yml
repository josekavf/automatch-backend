spring:
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: http://iam-service:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: catalog-service
          uri: http://catalog-service:8082
          predicates:
            - Path=/api/v1/professionals/**
          filters:
            - AuthenticationFilter

        - id: booking-service
          uri: http://booking-service:8083
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - AuthenticationFilter

        # Swagger routes for aggregation
        - id: iam-docs
          uri: http://iam-service:8081
          predicates:
            - Path=/iam-service/v3/api-docs/**
          filters:
            - RewritePath=/iam-service/(?<path>.*), /${path}

        - id: catalog-docs
          uri: http://catalog-service:8082
          predicates:
            - Path=/catalog-service/v3/api-docs/**
          filters:
            - RewritePath=/catalog-service/(?<path>.*), /${path}

        - id: booking-docs
          uri: http://booking-service:8083
          predicates:
            - Path=/booking-service/v3/api-docs/**
          filters:
            - RewritePath=/booking-service/(?<path>.*), /${path}

        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - AuthenticationFilter

        - id: notification-docs
          uri: http://notification-service:8084
          predicates:
            - Path=/notification-service/v3/api-docs/**
          filters:
            - RewritePath=/notification-service/(?<path>.*), /${path}
