version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: automatch-postgres-prod
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - automatch-net-prod

  redis:
    image: redis:7-alpine
    container_name: automatch-redis-prod
    ports:
      - "6379:6379"
    restart: always
    networks:
      - automatch-net-prod

  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: automatch-kafka-prod
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=L69V4vT4Tz2X6Z0X8y3X4A
    restart: always
    networks:
      - automatch-net-prod

  otel-collector:
    image: otel/opentelemetry-collector:0.96.0
    container_name: automatch-otel-prod
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: always
    networks:
      - automatch-net-prod

  api-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY}/api-gateway:${IMAGE_TAG:-latest}
    container_name: automatch-api-gateway-prod
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
    restart: always
    networks:
      - automatch-net-prod

  iam-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/iam-service:${IMAGE_TAG:-latest}
    container_name: automatch-iam-prod
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/iam_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
    depends_on:
      - postgres
      - kafka
    restart: always
    networks:
      - automatch-net-prod

  catalog-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/catalog-service:${IMAGE_TAG:-latest}
    container_name: automatch-catalog-prod
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/catalog_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
    depends_on:
      - postgres
      - redis
      - kafka
    restart: always
    networks:
      - automatch-net-prod

  booking-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/booking-service:${IMAGE_TAG:-latest}
    container_name: automatch-booking-prod
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/booking_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
    depends_on:
      - postgres
      - kafka
    restart: always
    networks:
      - automatch-net-prod

  notification-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/notification-service:${IMAGE_TAG:-latest}
    container_name: automatch-notification-prod
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://otel-collector:4318/v1/traces
    depends_on:
      - kafka
    restart: always
    networks:
      - automatch-net-prod

networks:
  automatch-net-prod:
    driver: bridge

volumes:
  postgres_data:
