name: CD - Staging

on:
  push:
    branches:
      - develop

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:develop

      - name: Build and Push IAM Service
        uses: docker/build-push-action@v5
        with:
          context: ./iam-service
          push: true
          tags: ghcr.io/${{ github.repository }}/iam-service:develop

      - name: Build and Push Catalog Service
        uses: docker/build-push-action@v5
        with:
          context: ./catalog-service
          push: true
          tags: ghcr.io/${{ github.repository }}/catalog-service:develop

      - name: Build and Push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: ./booking-service
          push: true
          tags: ghcr.io/${{ github.repository }}/booking-service:develop

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ghcr.io/${{ github.repository }}/notification-service:develop

      - name: Prepare Manifest
        env:
          NAMESPACE: staging
          IMAGE_TAG: develop
          REPOSITORY: ghcr.io/${{ github.repository }}
        run: |
          # Replace local image names with GHCR names and then substitute variables
          sed "s|image: automatch-|image: ${REPOSITORY}/|g" k8s/full-stack.yml | \
          envsubst '${NAMESPACE} ${IMAGE_TAG}' > k8s/deployment.yml

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Deploy to Staging
        run: |
          kubectl apply -f k8s/deployment.yml
