name: CD - Staging

on:
  push:
    branches:
      - develop

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api-gateway:develop
            ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }}

      - name: Build and Push IAM Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: iam-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/iam-service:develop
            ghcr.io/${{ github.repository }}/iam-service:${{ github.sha }}

      - name: Build and Push Catalog Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: catalog-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/catalog-service:develop
            ghcr.io/${{ github.repository }}/catalog-service:${{ github.sha }}

      - name: Build and Push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: booking-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/booking-service:develop
            ghcr.io/${{ github.repository }}/booking-service:${{ github.sha }}

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/notification-service:develop
            ghcr.io/${{ github.repository }}/notification-service:${{ github.sha }}

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml"
          target: "/var/www/automatch/staging"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p /var/www/automatch/staging
            cd /var/www/automatch/staging
            echo "IMAGE_TAG=${{ github.sha }}" > .env
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            docker-compose -p automatch-staging -f docker-compose.prod.yml pull
            docker-compose -p automatch-staging -f docker-compose.prod.yml up -d
            docker system prune -af
