name: CD - Production

on:
  push:
    branches:
      - main

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest

      - name: Build and Push IAM Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: iam-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/iam-service:latest

      - name: Build and Push Catalog Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: catalog-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/catalog-service:latest

      - name: Build and Push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: booking-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/booking-service:latest

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/notification-service:latest

      - name: Prepare Manifest
        env:
          NAMESPACE: production
          IMAGE_TAG: latest
          REPOSITORY: ghcr.io/${{ github.repository }}
        run: |
          # Replace local image names with GHCR names and then substitute variables
          sed "s|image: automatch-|image: ${REPOSITORY}/|g" k8s/full-stack.yml | \
          envsubst '${NAMESPACE} ${IMAGE_TAG}' > k8s/deployment.yml

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PROD }}

      - name: Deploy to Production
        run: |
          kubectl apply -f k8s/deployment.yml
