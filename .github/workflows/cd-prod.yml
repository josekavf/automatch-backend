name: CD - Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api_gateway:
              - 'api-gateway/**'
              - 'pom.xml'
            iam_service:
              - 'iam-service/**'
              - 'pom.xml'
            catalog_service:
              - 'catalog-service/**'
              - 'pom.xml'
            booking_service:
              - 'booking-service/**'
              - 'pom.xml'
            notification_service:
              - 'notification-service/**'
              - 'pom.xml'
            infra:
              - 'docker-compose.prod.yml'
              - 'docker/**'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Gateway
        if: steps.changes.outputs.api_gateway == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest

      - name: Build and Push IAM Service
        if: steps.changes.outputs.iam_service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: iam-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/iam-service:latest

      - name: Build and Push Catalog Service
        if: steps.changes.outputs.catalog_service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: catalog-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/catalog-service:latest

      - name: Build and Push Booking Service
        if: steps.changes.outputs.booking_service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: booking-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/booking-service:latest

      - name: Build and Push Notification Service
        if: steps.changes.outputs.notification_service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/notification-service:latest

      - name: Prepare VPS Directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: mkdir -p automatch-backend/prod

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml,docker/"
          target: "automatch-backend/prod"

      - name: Configure .env on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd automatch-backend/prod
            echo "IMAGE_TAG=latest" > .env
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "POSTGRES_USER=${{ secrets.DB_USERNAME }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: Deploy API Gateway
        if: steps.changes.outputs.api_gateway == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd automatch-backend/prod
            docker compose -p automatch-prod -f docker-compose.prod.yml pull api-gateway
            docker compose -p automatch-prod -f docker-compose.prod.yml up -d api-gateway

      - name: Deploy IAM Service
        if: steps.changes.outputs.iam_service == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd automatch-backend/prod
            docker compose -p automatch-prod -f docker-compose.prod.yml pull iam-service
            docker compose -p automatch-prod -f docker-compose.prod.yml up -d iam-service

      - name: Deploy Catalog Service
        if: steps.changes.outputs.catalog_service == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd automatch-backend/prod
            docker compose -p automatch-prod -f docker-compose.prod.yml pull catalog-service
            docker compose -p automatch-prod -f docker-compose.prod.yml up -d catalog-service

      - name: Deploy Booking Service
        if: steps.changes.outputs.booking_service == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd automatch-backend/prod
            docker compose -p automatch-prod -f docker-compose.prod.yml pull booking-service
            docker compose -p automatch-prod -f docker-compose.prod.yml up -d booking-service

      - name: Deploy Notification Service
        if: steps.changes.outputs.notification_service == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd automatch-backend/prod
            docker compose -p automatch-prod -f docker-compose.prod.yml pull notification-service
            docker compose -p automatch-prod -f docker-compose.prod.yml up -d notification-service

      - name: Deploy Infrastructure
        if: steps.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: |
            cd automatch-backend/prod
            docker compose -p automatch-prod -f docker-compose.prod.yml pull postgres redis kafka otel-collector pgadmin kafdrop jaeger prometheus loki grafana
            docker compose -p automatch-prod -f docker-compose.prod.yml up -d postgres redis kafka otel-collector pgadmin kafdrop jaeger prometheus loki grafana

      - name: Clean up unused Docker resources
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 30m
          script: docker system prune -af
